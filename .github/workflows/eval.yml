name: Eval Pipeline

on:
  pull_request:
    paths:
      - "prompts/**"
      - "data/golden_dataset_*.json"
      - "config.yaml"

jobs:
  eval:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write   # required to post PR comments

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed so we can load historical run files for diffing

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run eval
        id: eval
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python main.py 2>&1 | tee eval_output.txt
        continue-on-error: true   # capture output even on exit code 1

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SUMMARY=$(cat reports/summary.md)
          BODY="${SUMMARY}

          [Full HTML report (download from artifacts)](${RUN_URL})"

          gh pr comment ${{ github.event.pull_request.number }} --body "$BODY"

      - name: Upload eval report
        if: always()   # upload even if the eval failed
        uses: actions/upload-artifact@v4
        with:
          name: eval-report-${{ github.run_id }}
          path: reports/
          retention-days: 30

      - name: Fail on critical regression
        run: |
          if grep -q "Critical regression detected" eval_output.txt; then
            echo "Blocking merge due to critical regression."
            exit 1
          fi
