name: Eval Pipeline

on:
  pull_request:
    paths:
      - "prompts/**"
      - "data/golden_dataset_*.json"
      - "config.yaml"

# Cancel any in-progress run on the same branch when a new commit arrives
concurrency:
  group: eval-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  eval:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write   # required to post PR comments

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed so we can load historical run files for diffing

      # Exit early if the latest commit didn't touch eval-relevant files.
      # The pull_request paths filter fires when *any* PR commit touched those
      # paths — not just the latest one. This check closes that gap.
      - name: Check if relevant files changed in this commit
        id: changed
        env:
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          CHANGED=$(git diff ${PR_HEAD}~1 ${PR_HEAD} --name-only 2>/dev/null \
            | grep -E '^(prompts/|data/golden_dataset_|config\.yaml)' || true)
          if [ -z "$CHANGED" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Latest commit did not touch prompts, dataset, or config — skipping eval."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Relevant files changed: $CHANGED"
          fi

      - uses: actions/setup-python@v5
        if: steps.changed.outputs.skip == 'false'
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.changed.outputs.skip == 'false'
        run: pip install -r requirements.txt

      - name: Run eval
        if: steps.changed.outputs.skip == 'false'
        id: eval
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python main.py 2>&1 | tee eval_output.txt
        continue-on-error: true   # capture output even on exit code 1

      - name: Post PR comment
        if: steps.changed.outputs.skip == 'false' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SUMMARY=$(cat reports/summary.md)
          BODY="${SUMMARY}

          [Full HTML report (download from artifacts)](${RUN_URL})"

          gh pr comment ${{ github.event.pull_request.number }} --body "$BODY"

      - name: Upload eval report
        if: steps.changed.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: eval-report-${{ github.run_id }}
          path: reports/
          retention-days: 30

      - name: Fail on critical regression
        if: steps.changed.outputs.skip == 'false'
        run: |
          if grep -q "Critical regression detected" eval_output.txt; then
            echo "Blocking merge due to critical regression."
            exit 1
          fi
